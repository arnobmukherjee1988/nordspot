# NordSpot FastAPI serving layer
# 2 replicas for zero-downtime rolling deployments.
# Image is built and pushed to ghcr.io by .github/workflows/build.yml.
# Update the image tag to deploy a new version (CI/CD does this automatically).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: nordspot
  labels:
    app: api
    app.kubernetes.io/part-of: nordspot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # one extra pod during rollout
      maxUnavailable: 0  # never drop below 2 healthy replicas
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          # Built by .github/workflows/build.yml, tagged with git SHA.
          # 'latest' is updated on every push to main.
          image: ghcr.io/arnobmukherjee1988/nordspot-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: nordspot-config
          env:
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: nordspot-secrets
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nordspot-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: ENTSOE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nordspot-secrets
                  key: ENTSOE_API_KEY
            - name: NORDSPOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nordspot-secrets
                  key: NORDSPOT_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            # Pod is not sent traffic until /health returns 2xx
          volumeMounts:
            - name: model
              mountPath: /app/model
              readOnly: true
      volumes:
        - name: model
          # Shared model artefacts - in production, mount from GCS via gcsfuse
          # or copy into the image during the CI build.
          # For local K3s: use a hostPath or pre-populate via `kubectl cp`.
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: nordspot
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
