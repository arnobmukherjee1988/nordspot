name: "nordspot"
version: "1.0.0"
config-version: 2

# Profile name must match the key in profiles.yml
profile: "nordspot"

# Paths
model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  nordspot:
    silver:
      +materialized: table
      +engine: MergeTree()
      # order_by is set per-model via {{ config() }} blocks — crossborder uses
      # (from_zone, to_zone, valid_time) while generation and load use (zone, valid_time)
