services:

  # ── ClickHouse (bitemporal time-series store) ──────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: se3_clickhouse
    environment:
      CLICKHOUSE_DB: se3db
      CLICKHOUSE_USER: se3user
      CLICKHOUSE_PASSWORD: se3password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"   # HTTP interface (used by clickhouse-connect / TimeDB SDK)
      - "9000:9000"   # Native TCP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # Memory cap: prevents ClickHouse from using >45% RAM on the 2 GB server
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/memory.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  # ── Streamlit dashboard ────────────────────────────────────────────────────
  app:
    build: .
    container_name: se3_app
    # Load .env for ENTSOE_API_KEY, SE3_LAT/LON, SE3_TRAIN_START, MODEL_DIR.
    # TIMEDB_CH_URL is overridden below so the app reaches ClickHouse via the
    # Docker-internal hostname rather than localhost.
    env_file: .env
    environment:
      TIMEDB_CH_URL: http://se3user:se3password@clickhouse:8123/se3db
      # Weather cache path — stored in a named volume so it survives restarts
      WEATHER_CACHE_PATH: /app/data/.weather_cache.sqlite
    ports:
      - "8501:8501"
    volumes:
      # Model artefacts: persist across container restarts, shared with training runs
      - ./model:/app/model
      # Weather cache: persist SQLite cache so Open-Meteo isn't re-fetched on every restart
      - weather_cache:/app/data
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  clickhouse_data:
  weather_cache:
