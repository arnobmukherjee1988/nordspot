services:

  # ── ClickHouse (time-series store) ────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: nordspot_clickhouse
    environment:
      CLICKHOUSE_DB: nordspot
      CLICKHOUSE_USER: nordspot
      CLICKHOUSE_PASSWORD: nordspot
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/memory.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  # ── Redis (Feast online store) ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: nordspot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── MLflow tracking server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: nordspot_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── Streamlit dashboard ────────────────────────────────────────────────────
  dashboard:
    build: .
    container_name: nordspot_dashboard
    env_file: .env
    environment:
      TIMEDB_CH_URL: http://nordspot:nordspot@clickhouse:8123/nordspot
      WEATHER_CACHE_PATH: /app/data/.weather_cache.sqlite
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8501:8501"
    volumes:
      - ./model:/app/model
      - weather_cache:/app/data
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  # ── FastAPI serving ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nordspot_api
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      TIMEDB_CH_URL: http://nordspot:nordspot@clickhouse:8123/nordspot
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 4
    depends_on:
      clickhouse:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Airflow (stub — implemented in Epic 2) ─────────────────────────────────
  # airflow-webserver:
  #   image: apache/airflow:2.9.1
  #   container_name: nordspot_airflow_web
  #   ports:
  #     - "8080:8080"

volumes:
  clickhouse_data:
  redis_data:
  mlflow_data:
  weather_cache:
